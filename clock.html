<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>clock</title>
</head>
<body>
    <div class="container">
        <div class ="secondary-container">    
            <div class=" clock timer">
                <div class="progress timer-progress-bar"></div>
                <div class="face">
                    <div class="name glass" data-text="Timer">Timer</div>
                <div class = "display timer-display">
                    <span class="segment" id="hours">00</span>
                <span>:</span>
                <span class="segment" id="minutes">00</span>
                <span>:</span>
                <span class="segment" id="seconds">00</span>
            </div>
                <div class="timer-buttons">
                <button class="timer-start">Start</button>
                
                <button class="timer-stop">stop</button>
                </div>
                </div>
            </div>
            <div class = "timer-displayes">
            <div class = "display secondary-display secondary-timer-display">00:00:00</div>
            </div>
            
        </div>


    <div class="clock watch">
        <div class="progress clock-progress-bar"></div>
        <div class="face clock-face">
            <div class="center"></div>
            <div class="hand hour-hand"></div>
            <div class="hand min-hand"></div>
            <div class="hand second-hand"></div>

            <div class="numbers">
                <span style="--i:1"><b>1</b></span>
                <span style="--i:2"><b>2</b></span>
                <span style="--i:3"><b>3</b></span>
                <span style="--i:4"><b>4</b></span>
                <span style="--i:5"><b>5</b></span>
                <span style="--i:6"><b>6</b></span>
                <span style="--i:7"><b>7</b></span>
                <span style="--i:8"><b>8</b></span>
                <span style="--i:9"><b>9</b></span>
                <span style="--i:10"><b>10</b></span>
                <span style="--i:11"><b>11</b></span>
                <span style="--i:12"><b>12</b></span>
            </div>

        </div>
    </div>


    <div class ="secondary-container">  
        <div class="clock stopwatch">
            <div class="progress stopwatch-progress-bar"></div>
                <div class="face">
                    <div class="name glass" data-text="Stopwatch">Stopwatch</div>
                    <button class="stopwatch-start" >Start</button>
                    <button class ="add add-stopwatch">+</button>
                </div> 
            </div>
            <div class="stopwatch-displayes">
            <div class = "display stopwatch-display">00:00:00</div>
            </div>
        </div>
        
   
    <!-- Добавим звук секундной стрелке -->
    <audio class="tick" src="./dassda67.mp3" preload="auto" ></audio>
    <script src="./clock.js"></script>

</body>
</html>
